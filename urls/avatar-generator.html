<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AVATAR_GEN | 头像生成器</title>
    <style>
        :root {
            --primary-color: #00f3ff; /* 赛博青 */
            --bg-dark: #0a0b10;
            --panel-bg: rgba(16, 18, 27, 0.8);
            --font-mono: 'Fira Code', 'Courier New', monospace;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-dark);
            color: var(--primary-color);
            font-family: var(--font-mono);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            text-transform: uppercase;
        }

        /* 科技感背景纹理 */
        body::before {
            content: "";
            position: absolute;
            width: 100%;
            height: 100%;
            background-image: linear-gradient(0deg, transparent 24%, rgba(0, 243, 255, .05) 25%, rgba(0, 243, 255, .05) 26%, transparent 27%, transparent 74%, rgba(0, 243, 255, .05) 75%, rgba(0, 243, 255, .05) 76%, transparent 77%, transparent), linear-gradient(90deg, transparent 24%, rgba(0, 243, 255, .05) 25%, rgba(0, 243, 255, .05) 26%, transparent 27%, transparent 74%, rgba(0, 243, 255, .05) 75%, rgba(0, 243, 255, .05) 76%, transparent 77%, transparent);
            background-size: 50px 50px;
            z-index: -1;
        }

        .container {
            overflow: visible !important;
            background: var(--panel-bg);
            padding: 2rem;
            border: 1px solid var(--primary-color);
            box-shadow: 0 0 20px rgba(0, 243, 255, 0.2);
            position: relative;
            clip-path: polygon(0 0, 100% 0, 100% 90%, 90% 100%, 0 100%); /* 切角设计 */
        }

        .header {
            font-size: 0.8rem;
            margin-bottom: 1.5rem;
            display: flex;
            justify-content: space-between;
            border-bottom: 1px solid rgba(0, 243, 255, 0.3);
            padding-bottom: 0.5rem;
        }

        .canvas-wrapper {
            position: relative;
            padding: 10px;
            border: 1px dashed rgba(0, 243, 255, 0.5);
            background: rgba(0, 0, 0, 0.3);
        }

        canvas {
            display: block;
            image-rendering: pixelated; /* 保持像素清晰 */
        }

        .controls {
            margin-top: 1.5rem;
            display: grid;
            grid-template-columns: repeat(2, 50%);
            grid-template-rows: repeat(2, 50%);
            gap: 2px;
        }

        button {
            background: transparent;
            border: 1px solid var(--primary-color);
            color: var(--primary-color);
            padding: 0.6rem 0.8rem;
            cursor: pointer;
            font-family: var(--font-mono);
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
            clip-path: polygon(0 0, 100% 0, 100% 70%, 92% 100%, 0 100%);
        }

        button:hover {
            background: var(--primary-color);
            color: var(--bg-dark);
            box-shadow: 0 0 15px var(--primary-color);
        }

        .info-panel {
            margin-top: 1rem;
            font-size: 0.7rem;
            color: rgba(0, 243, 255, 0.6);
        }

        /* 扫描线动画 */
        .scan-line {
            position: absolute;
            width: 100%;
            height: 2px;
            background: var(--primary-color);
            opacity: 0.5;
            top: 0;
            left: 0;
            pointer-events: none;
            animation: scan 3s linear infinite;
        }

        button::after {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: var(--primary-color);
            color: var(--bg-dark);
            display: flex;
            justify-content: center;
            align-items: center;
            transform: translate(0, 100%);
            transition: transform 0.5s cubic-bezier(0.2, 1, 0.3, 1);
        }
        #randomize::after {
            content: "RANDOMIZE";
        }
        #snapshot::after {
            content: "SNAP_SHOT";
        }
        #download::after {
            content: "EXPORT_PNG";
        }
        #copyLink::after {
            content: "COPY_LINK";
        }
        #copyed::after {
            content: "COPIED!";
        }

        button:hover::after {
            transform: translate(0, 0);
        }

        /* 简单的背景视差逻辑 */
        #bg-grid {
            position: fixed;
            top: -5%; left: -5%;
            width: 110%; height: 110%;
            background-image: 
                linear-gradient(rgba(0, 243, 255, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 243, 255, 0.05) 1px, transparent 1px);
            background-size: 40px 40px;
            z-index: -1;
            transition: transform 0.1s ease-out;
        }

        .style-selector {
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.8rem;
            margin-right: 20px;
        }

        .cyber-select-container {
            margin-bottom: 20px;
            z-index: 100;
        }

        .label {
            font-size: 0.65rem;
            color: rgba(0, 243, 255, 0.5);
            margin-bottom: 5px;
            letter-spacing: 1px;
        }

        .custom-select {
            position: relative;
            width: 220px;
            z-index: 999; 
            border: 1px solid var(--primary-color);
            background: rgba(0, 20, 30, 0.8);
            cursor: pointer;
            clip-path: polygon(0 0, 100% 0, 100% 70%, 92% 100%, 0 100%);
        }
        .custom-select:hover {
            clip-path: none;
        }

        .selected-value {
            padding: 8px 15px;
            font-size: 0.9rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: relative;
        }

        /* 内部扫描线 */
        .glitch-line {
            position: absolute;
            bottom: 0; left: 0;
            width: 100%; height: 1px;
            background: var(--primary-color);
            box-shadow: 0 0 5px var(--primary-color);
            animation: scan-vertical 4s infinite;
        }

        .options-panel {
            display: none; /* 默认隐藏 */
            position: absolute;
            top: 100%;
            left: -1px;
            width: calc(100% + 2px);
            background: var(--bg-dark);
            border: 1px solid var(--primary-color);
            box-shadow: 0 10px 30px rgba(0, 243, 255, 0.8);
            z-index: 10000 !important;
        }

        .options-panel.active {
            display: block !important;
        }

        .option {
            padding: 10px 15px;
            font-size: 0.8rem;
            transition: all 0.2s;
            border-bottom: 1px solid rgba(0, 243, 255, 0.1);
            z-index: 10000 !important;
        }

        .option:hover {
            background: var(--primary-color);
            color: var(--bg-dark);
            padding-left: 25px; /* 悬停偏移感 */
        }

        /* 电子方格纹理背景 */
        .options-panel::before {
            content: "";
            position: absolute;
            inset: 0;
            background-image: radial-gradient(var(--primary-color) 0.5px, transparent 0.5px);
            background-size: 4px 4px;
            opacity: 0.1;
            pointer-events: none;
        }

        @keyframes scan-vertical {
            0% { transform: translateY(0); opacity: 0; }
            50% { opacity: 1; }
            100% { transform: translateY(-30px); opacity: 0; }
        }

        @keyframes scan {
            0% { top: 0; }
            100% { top: 100%; }
        }
        @keyframes flicker {
            0% { opacity: 0.98; }
            5% { opacity: 0.95; }
            10% { opacity: 0.99; }
            100% { opacity: 1; }
        }

        .canvas-section.glitch-active {
            animation: flicker 0.1s infinite;
        }

        /* 增加一种扫描线纹理 */
        .canvas-section::after {
            content: "";
            position: absolute;
            inset: 0;
            background: linear-gradient(
                rgba(18, 16, 16, 0) 50%, 
                rgba(0, 0, 0, 0.1) 50%
            ), linear-gradient(
                90deg, 
                rgba(255, 0, 0, 0.03), 
                rgba(0, 255, 0, 0.01), 
                rgba(0, 0, 255, 0.03)
            );
            background-size: 100% 3px, 3px 100%;
            pointer-events: none;
        }

        /* 预览图初始状态：隐藏且锁定大小 */
        #staticPreview {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: none; /* 初始隐藏 */
            z-index: 100;
            object-fit: contain;
            background: var(--bg);
        }

        /* 拍照瞬间的闪光反馈 */
        .flash-effect {
            animation: flash 0.4s ease-out;
        }

        @keyframes flash {
            0% { filter: brightness(5); }
            100% { filter: brightness(1); }
        }

        /* 隐藏动画的辅助类 */
        .animation-paused .scan-line {
            display: none !important;
        }

        .resume-hint {
            display: none;
            position: absolute;
            bottom: -30px;
            width: 100%;
            text-align: center;
            font-size: 16px;
            color: var(--primary);
            letter-spacing: 1px;
            cursor: pointer;
        }

        .resume-hint:hover {
            background: var(--primary-color);
            color: var(--bg-dark);
        }
    </style>
</head>
<body id="bg-grid">
<div class="container">
    <div class="cyber-select-container">
        <div class="label">VISUAL_ENGINE_MODE:</div>
        <div class="custom-select" id="customSelectContainer">
            <div class="selected-value" id="triggerBtn">
                <span id="currentValueText">MINIMAL_DATA</span>
                <span style="font-size: 0.6rem; opacity: 0.5;">▼</span>
                <div class="glitch-line"></div>
            </div>
            <div class="options-panel" id="optionsPanel">
                <div class="option" data-value="data">MINIMAL_DATA</div>
                <div class="option" data-value="glitch">GLITCH_DATA</div>
                <div class="option" data-value="plexus">GEOM_PLEXUS</div>
            </div>
        </div>
    </div>
    <div class="header">
        <span>Status: Online</span>
        <span id="timestamp">ID: NULL</span>
    </div>

    <div id="avatarContainer" class="canvas-wrapper">
        <div class="scan-line"></div>
        <canvas id="avatarCanvas" width="300" height="300"></canvas>
        <img id="staticPreview" class="hidden-snapshot" alt="Avatar Snapshot">
        <div class="corner-decoration bottom-right"></div>
        <br />
        <div id="resumeBtn" class="resume-hint" onclick="exitSnapshotMode()">
            [ RESUME_LIVE_FEED ]
        </div>
    </div>

    <div id="infoPanel" class="info-panel">
        <div>Algorithm: Symmetric_Data_v1.0</div>
        <div id="seedText">Seed: --------</div>
    </div>

    <div class="controls">
        <button id="randomize" onclick="generateAvatar()">Randomize</button>
        <button id="snapshot" onclick="takeSnapshot()">Snap_Shot</button>
        <button id="copyLink" onclick="copyShareLink(this)">Copy_Link</button>
        <button id="download" onclick="downloadAvatar()">Export_PNG</button>
    </div>
</div>

<script>
// 使用更现代的事件监听方式，避免 HTML 属性里的 onclick 失效
document.addEventListener('DOMContentLoaded', () => {
    const trigger = document.getElementById('triggerBtn');
    const panel = document.getElementById('optionsPanel');
    const options = document.querySelectorAll('.option');

    // 1. 点击触发器切换显示
    trigger.addEventListener('click', (e) => {
        e.stopPropagation(); // 阻止冒泡到 window
        panel.classList.toggle('active');
    });

    // 2. 点击选项
    options.forEach(opt => {
        opt.addEventListener('click', (e) => {
            exitSnapshotMode();
            const val = opt.getAttribute('data-value');
            const label = opt.innerText;
            
            // 更新 UI
            document.getElementById('currentValueText').innerText = label;
            panel.classList.remove('active');
            
            // 执行切换逻辑 (确保你之前的 switchStyle 函数存在)
            if (typeof switchStyle === 'function') {
                switchStyle(val);
            }
        });
    });

    // 3. 点击外部自动关闭
    window.addEventListener('click', () => {
        panel.classList.remove('active');
    });
});

const btns = document.querySelectorAll('button');
btns.forEach(btn => {
    btn.addEventListener('mousemove', (e) => {
        const x = (e.clientX / window.innerWidth - 0.5) * 20; // 移动范围 20px
        const y = (e.clientY / window.innerHeight - 0.5) * 20;
        const bgGrid = document.getElementById('bg-grid');
        if (!bgGrid) return;
        bgGrid.style.transform = `translate(${x}px, ${y}px)`;
    });
});

const canvas = document.getElementById('avatarCanvas');
const preview = document.getElementById('staticPreview');
const infoPanel = document.getElementById('infoPanel');
const ctx = canvas.getContext('2d');
const seedText = document.getElementById('seedText');
const idText = document.getElementById('timestamp');

// 新增全局变量控制过渡
let currentHue = 0;
let targetHue = 0;
let gridData = []; // 存储当前的像素阵列
let currentStyle = 'data'; // 默认为极简数据
let currentStyleName = 'MINIMAL_DATA';
let currentSeed = '';
let points = [];           // 专门为 Plexus 存储点数据
const MAX_POINTS = 40;     // 连线点的数量

// --- 核心逻辑：从 URL 获取或生成新种子 ---
function init() {
    const urlParams = new URLSearchParams(window.location.search);
    const urlSeed = urlParams.get('seed');
    const urlStyle = urlParams.get('style') || 'data';

    // 同步下拉框 UI
    updateURL();
    currentStyle = urlStyle;

    renderLoop(); // 启动持续渲染循环
    generateAvatar(urlSeed || null, false);
}

function switchStyle(val) {
    currentStyle = val;
    if (val === 'plexus') initPlexus(); // 切换时初始化点
    // 关键：切换风格也要更新 URL 状态
    updateURL();
}

function updateURL() {
    const urlParams = new URLSearchParams(window.location.search);
    const currentSeed = seedText.innerText.split(': ')[1].toLowerCase();
    const newUrl = `${window.location.origin}${window.location.pathname}?seed=${currentSeed}&style=${currentStyle}`;
    window.history.replaceState({ path: newUrl }, '', newUrl);
    document.getElementById('currentValueText').innerText = currentStyleName;
}

function initPlexus() {
    points = [];
    for (let i = 0; i < MAX_POINTS; i++) {
        points.push({
            x: Math.random() * canvas.width,
            y: Math.random() * canvas.height,
            vx: (Math.random() - 0.5) * 1.5,
            vy: (Math.random() - 0.5) * 1.5
        });
    }
}

function renderLoop() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    
    if (currentStyle === 'glitch') {
        currentStyleName = 'GLITCH_DATA'
        renderGlitchStyle();
    } else if (currentStyle === 'plexus') {
        currentStyleName = 'GEOM_PLEXUS'
        renderPlexusStyle();
    } else {
        currentStyleName = 'MINIMAL_DATA'
        renderDataStyle();
    }

    requestAnimationFrame(renderLoop);
}

function renderDataStyle() {
    // 1. 颜色插值 (让 currentHue 追赶 targetHue)
    const diff = targetHue - currentHue;
    currentHue += diff * 0.05; // 0.05 是平滑系数

    // 2. 绘图逻辑
    const size = 8;
    const cellSize = canvas.width / size;
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    
    ctx.shadowBlur = 15;
    ctx.shadowColor = `hsl(${currentHue}, 80%, 60%)`;
    ctx.fillStyle = `hsl(${currentHue}, 70%, 50%)`;

    gridData.forEach((col, x) => {
        col.forEach((isFilled, y) => {
            if (isFilled) {
                // 绘制带有一点圆角的矩形增加精致感
                ctx.fillRect(x * cellSize + 1, y * cellSize + 1, cellSize - 2, cellSize - 2);
                ctx.fillRect((size - 1 - x) * cellSize + 1, y * cellSize + 1, cellSize - 2, cellSize - 2);
            }
        });
    });
}

function renderPlexusStyle() {
    const diff = targetHue - currentHue;
    currentHue += diff * 0.05; // 0.05 是平滑系数
    ctx.shadowBlur = 0; // Plexus 不需要太强的全局发光，否则会糊成一团
    
    // 1. 更新并绘制点
    points.forEach((p, i) => {
        p.x += p.vx;
        p.y += p.vy;

        // 边界碰撞检查
        if (p.x < 0 || p.x > canvas.width) p.vx *= -1;
        if (p.y < 0 || p.y > canvas.height) p.vy *= -1;

        ctx.fillStyle = `hsl(${currentHue}, 80%, 60%)`;
        ctx.beginPath();
        ctx.arc(p.x, p.y, 2, 0, Math.PI * 2);
        ctx.fill();

        // 2. 连线算法 (核心挑战：双重循环)
        for (let j = i + 1; j < points.length; j++) {
            const p2 = points[j];
            const dx = p.x - p2.x;
            const dy = p.y - p2.y;
            const dist = Math.sqrt(dx * dx + dy * dy);

            if (dist < 80) { // 连线阈值
                ctx.strokeStyle = `hsla(${currentHue}, 70%, 50%, ${1 - dist / 80})`;
                ctx.lineWidth = 0.8;
                ctx.beginPath();
                ctx.moveTo(p.x, p.y);
                ctx.lineTo(p2.x, p2.y);
                ctx.stroke();
            }
        }
    });
}

function generateAvatar(passedSeed = null, updateHistory = true, shouldUpdateURL = true) {
    // 1. 确定种子
    const seed = passedSeed || Math.random().toString(16).slice(2, 10);
    targetHue = parseInt(seed.substring(0, 2), 16) % 360;

    // 如果是 Plexus 模式，我们可以根据 seed 改变点的运动速度或初始位置
    if (currentStyle === 'plexus') {
        initPlexus(); 
    }

    // 更新数据模型而非直接绘图
    gridData = [];
    
    // 2. 更新 UI 显示
    seedText.innerText = `Seed: ${seed.toUpperCase()}`;
    idText.innerText = `ID: ${Math.floor(Date.now()/1000)}`;

    // 3. 如果需要，同步更新 URL 地址栏
    if (updateHistory) {
        const newUrl = `${window.location.origin}${window.location.pathname}?seed=${seed}`;
        window.history.replaceState({ path: newUrl }, '', newUrl);
    }

    // --- 渲染逻辑 ---
    const size = 8;
    const cellSize = canvas.width / size;
    const hue = parseInt(seed.substring(0, 2), 16) % 360;

    for (let x = 0; x < size / 2; x++) {
        gridData[x] = [];
        for (let y = 0; y < size; y++) {
            const val = parseInt(seed, 16) >> (x + y);
            gridData[x][y] = (val & 1) === 1;
        }
    }
    
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.shadowBlur = 12;
    ctx.shadowColor = `hsl(${hue}, 80%, 60%)`;
    ctx.fillStyle = `hsl(${hue}, 70%, 50%)`;

    for (let x = 0; x < size / 2; x++) {
        for (let y = 0; y < size; y++) {
            // 使用 seed 的不同部分来决定像素
            const val = parseInt(seed, 16) >> (x + y);
            if ((val & 1) === 1) {
                ctx.fillRect(x * cellSize, y * cellSize, cellSize, cellSize);
                ctx.fillRect((size - 1 - x) * cellSize, y * cellSize, cellSize, cellSize);
            }
        }
    }
    if (shouldUpdateURL) {
        updateURL();
    }
}

let takeSnapshotFlag = false;
function takeSnapshot() {
    const canvas = document.getElementById('avatarCanvas');
    const container = document.getElementById('avatarContainer');
    const resumeBtn = document.getElementById('resumeBtn');

    // 1. 如果是 Glitch 模式，先触发一次强制故障渲染
    if (currentStyle === 'glitch') {
        renderGlitchEffect(true); 
    }

    // 2. 将 Canvas 内容转换为图片并显示
    const dataURL = canvas.toDataURL('image/png');
    preview.src = dataURL;
    preview.style.display = 'block';
    
    // 3. 隐藏动画和 Canvas
    canvas.style.visibility = 'hidden';
    infoPanel.style.visibility = 'hidden';
    container.classList.add('animation-paused');
    container.classList.add('flash-effect');
    resumeBtn.style.display = 'block';

    // 4. 清除闪光效果类（以便下次再次触发）
    setTimeout(() => container.classList.remove('flash-effect'), 400);
    takeSnapshotFlag = true;
}

// 新增：复制链接功能
function copyShareLink(btn) {
    const shareUrl = window.location.href;
    navigator.clipboard.writeText(shareUrl).then(() => {
        const originalText = btn.innerText;
        btn.innerText = "COPIED!";
        btn.id = "copyed";
        setTimeout(() => {
            btn.innerText = originalText
            btn.id = "copyLink"
        }, 2000);
    });
}

function downloadAvatar() {
    // 如果是故障模式，先手动触发一次强力故障
    if (currentStyle === 'glitch') {
        renderGlitchEffect(true); // 传入 true 表示“导出增强模式”
    }

    const link = document.createElement('a');
    const timestamp = Math.floor(Date.now() / 1000);
    link.download = `neural_avatar_${currentSeed}_${timestamp}.png`;
    if (takeSnapshotFlag) {
        link.href = preview.src;
    } else {
        link.href = canvas.toDataURL();
    }
    link.click();

    canvas.style.filter = 'brightness(5)';
    setTimeout(() => {
        canvas.style.filter = 'none';
    }, 1000);
}

// 退出预览，回到实时动画
function exitSnapshotMode() {
    const canvas = document.getElementById('avatarCanvas');
    const preview = document.getElementById('staticPreview');
    const container = document.getElementById('avatarContainer');
    const resumeBtn = document.getElementById('resumeBtn');

    preview.style.display = 'none';
    canvas.style.visibility = 'visible';
    infoPanel.style.visibility = 'visible';
    container.classList.remove('animation-paused');
    resumeBtn.style.display = 'none';
}

// Glitch 专用变量
let glitchTimer = 0;

function slicing(ctx, cnt=5, sliceParam=20, offsetParam=40) {
    const w = canvas.width;
    const h = canvas.height;
    for (let i = 0; i < cnt; i++) {
        let x = Math.random() * w;
        let y = Math.random() * h;
        let sliceH = 5 + Math.random() * sliceParam; // 切片高度
        let offset = (Math.random() - 0.5) * offsetParam; // 偏移量
        // 复制一部分画布再贴回去，产生位移
        ctx.drawImage(canvas, 0, y, w, sliceH, offset, y, w, sliceH);
    }
}

function rgbSplit(ctx, alpha=0.5, rOffset=2, bOffset=-2, shadowBlur=5) {
    // --- 算法 B: RGB 分离 (RGB Split) ---
    ctx.save();
    ctx.globalCompositeOperation = 'lighter';
    ctx.globalAlpha = alpha; 
    
    // 红色通道偏移
    if (shadowBlur !== 0) {
        ctx.shadowColor = 'red';
        ctx.shadowBlur = shadowBlur;
    }
    ctx.drawImage(canvas, rOffset, 0); 
    
    // 蓝色通道偏移
    if (shadowBlur !== 0) {
        ctx.shadowColor = 'blue';
        ctx.shadowBlur = shadowBlur;
    }
    ctx.drawImage(canvas, bOffset, 0);
    
    ctx.restore();
}

function renderGlitchStyle() {
    // 1. 先绘制基础图形 (我们可以复用 Data 风格的逻辑作为底图)
    renderDataStyle(); 

    // 2. 控制故障频率：不是每一帧都闪，随机触发
    if (Math.random() > 0.85) {
        const ctx = canvas.getContext('2d');
        const w = canvas.width;
        const h = canvas.height;

        // --- 算法 A: 位移切割 (Slicing) ---
        // 随机切 3-5 个水平条进行偏移
        slicing(ctx, 5)

        // --- 算法 B: RGB 分离 (RGB Split) ---
        // 通过设置不同的透明度和合成模式模拟
        rgbSplit(ctx)

        // --- 算法 C: 随机白噪点 ---
        if (Math.random() > 0.9) {
            ctx.fillStyle = `rgba(255, 255, 255, ${Math.random() * 0.2})`;
            ctx.fillRect(0, Math.random() * h, w, 1);
        }
    }
}

// 修改后的逻辑，抽离出渲染核心
function renderGlitchEffect(forceFull = false) {
    const w = canvas.width;
    const h = canvas.height;
    // 如果是强制模式或随机命中
    if (forceFull || Math.random() > 0.85) {
        slicing(ctx, 5, 20, 40)
        if (Math.random() > 0.9) {
            ctx.fillStyle = `rgba(255, 255, 255, ${Math.random() * 0.2})`;
            ctx.fillRect(0, Math.random() * h, w, 1);
        }
    }
}

// 启动
init();
</script>
