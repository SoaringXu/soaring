<!DOCTYPE html>

    <style>

            .layer-title { font-size: 0.8rem; }
            .custom-select-options {
                max-height: 560px;
            }
            .options-list {

            }
            .option-item {
                padding: 0.3rem 1rem;

    </style>
</head>
<body>
<div class="container">
    <h1>🧭 圣物工坊 · 全层级溯源 </h1>
    <div class="sub">下拉选择物品自动显示直接配方+基础材料总数 | 点击「揭示全层材料」显示每层材料汇总</div>

    <div class="search-section">
        <div class="selector-area">
            <div class="input-group">
                <label>📦 选择兑换物品</label>
                <div class="custom-select-wrapper" id="customSelectWrapper">
                    <div class="custom-select-trigger" id="customSelectTrigger">
                        <span id="selectedItemText">- 请选择物品 -</span>
                        <span class="arrow">▼</span>
                    </div>
                    <div class="custom-select-options" id="customSelectOptions" style="display: none;">
                        <div class="options-list" id="optionsList"></div>
                    </div>
                </div>
            </div>
            <button id="toggleViewBtn" class="search-btn">✨揭示全层材料</button>
            <button id="calcMaterialBtn" class="back-btn">📊计算所需材料</button>
        </div>
    </div>

    <div class="result-card">
        <div class="result-header">
            <h2>📜 <span id="resultItemName" class="recipe-badge">未选取</span><span id="nameTips"></span></h2>
        </div>
        <div id="recipeDisplay" class="recipe-list" style="padding: 0.8rem;">
            <div class="empty-message">⚡ 选择物品后自动显示直接配方及完全分解基础材料</div>
        </div>
    </div>
    <footer>※ 多配方物品使用Tab切换 | 分层材料展示每一级合成所需材料数量</footer>

    <!-- 计算所需材料弹窗 -->
    <div id="materialDialog" class="dialog-overlay" style="display: none;">
        <div class="dialog-container">
            <div class="dialog-header">
                <h3>📊 计算所需材料</h3>
                <button class="dialog-close">&times;</button>
            </div>
            <div class="dialog-body" id="dialogBody">
                <!-- 动态生成表单 -->
            </div>
            <div class="dialog-footer">
                <button id="calcSubmitBtn" class="search-btn">计算还需数量</button>
                <button id="calcCancelBtn" class="back-btn">取消</button>
            </div>
            <div id="calcResult" class="calc-result" style="display: none;"></div>
        </div>
    </div>
</div>

<script>
    // ---------- CSV原始数据 ----------
    const csvRaw = `,暗夜对剑,冲锋盾,尖刺铠甲,镇魂宝石,神行靴,白银之刃,圣洁坠饰,奥术披风,阔剑,小圆盾,龙纹印,纪念石碑,红宝石杯,治愈之心,潮汐之刃,秘法钥匙,傀儡娃娃,野兽图腾,集合旗,部落酒杯,骨质节杖,秘银斧,青铜匕首,骨锯,石锤,野兽骨,青铜镜,石灰岩
随机永恒I,1,,1,1,,,,,,,,,,,,,,,,,,,,,,,,
随机永恒I,,1,1,1,,,,,,,,,,,,,,,,,,,,,,,,
随机永恒I,1,1,,1,,,,,,,,,,,,,,,,,,,,,,,,
随机永恒I,1,1,1,,,,,,,,,,,,,,,,,,,,,,,,,
随机永恒II,,,,,1,,1,1,,,,,,,,,,,,,,,,,,,,
随机永恒II,,,,,,1,1,1,,,,,,,,,,,,,,,,,,,,
随机永恒II,,,,,1,1,,1,,,,,,,,,,,,,,,,,,,,
随机永恒II,,,,,1,1,1,,,,,,,,,,,,,,,,,,,,,
随机神话I,,,,,,,,,1,,1,1,,,,,,,,,,,,,,,,
随机神话I,,,,,,,,,,1,1,1,,,,,,,,,,,,,,,,
随机神话I,,,,,,,,,1,1,,1,,,,,,,,,,,,,,,,
随机神话I,,,,,,,,,1,1,1,,,,,,,,,,,,,,,,,
随机神话II,,,,,,,,,,,,,1,,1,1,,,,,,,,,,,,
随机神话II,,,,,,,,,,,,,,1,1,1,,,,,,,,,,,,
随机神话II,,,,,,,,,,,,,1,1,,1,,,,,,,,,,,,
随机神话II,,,,,,,,,,,,,1,1,1,,,,,,,,,,,,,
阔剑,,,,,,,,,,,,,,,,,1,1,,1,,,,,,,,
小圆盾,,,,,,,,,,,,,,,,,1,,1,,,1,,,,,,
龙纹印,,,,,,,,,,,,,,,,,1,,,1,,1,,,,,,
纪念石碑,,,,,,,,,,,,,,,,,,1,1,1,,,,,,,,
红宝石杯,,,,,,,,,,,,,,,,,,1,,,1,1,,,,,,
治愈之心,,,,,,,,,,,,,,,,,,,1,1,1,,,,,,,
潮汐之刃,,,,,,,,,,,,,,,,,,,1,,1,1,,,,,,
秘法钥匙,,,,,,,,,,,,,,,,,1,1,,,1,,,,,,,
傀儡娃娃,,,,,,,,,,,,,,,,,,,,,,,2,1,,,,
野兽图腾,,,,,,,,,,,,,,,,,,,,,,,1,2,,,,
集合旗,,,,,,,,,,,,,,,,,,,,,,,,2,1,,,
部落酒杯,,,,,,,,,,,,,,,,,,,,,,,,1,2,,,
骨质节杖,,,,,,,,,,,,,,,,,,,,,,,2,,1,,,
秘银斧,,,,,,,,,,,,,,,,,,,,,,,1,,2,,,
青铜匕首,,,,,,,,,,,,,,,,,,,,,,,,,,2,4,
骨锯,,,,,,,,,,,,,,,,,,,,,,,,,,4,,2
石锤,,,,,,,,,,,,,,,,,,,,,,,,,,,2,4`;

    // 全局：当前物品、当前配方索引
    let currentItem = null;
    let currentTabRecipeIndex = 0;  // 0-based

    function parseCraftingData(csvStr) {
        const lines = csvStr.split(/\r?\n/);
        const headersRaw = lines[0].split(',');
        const headers = headersRaw.map(h => h.trim());
        const recipesMap = new Map();
        const orderSet = new Set();
        const orderList = [];
        const materialNames = [];  // 在解析表头时收集
        for (let i = 1; i < headers.length; i++) {
            if (headers[i] && headers[i] !== "") {
                materialNames.push(headers[i]);
            }
        }
        for (let i = 1; i < lines.length; i++) {
            const line = lines[i].trim();
            if (!line) continue;
            const cells = line.split(',');
            let itemName = cells[0] ? cells[0].trim() : "";
            if (!itemName) continue;
            if (!orderSet.has(itemName)) { orderSet.add(itemName); orderList.push(itemName); }
            const fullRow = [];
            for (let j = 0; j < headers.length; j++) {
                if (j < cells.length) fullRow.push(cells[j] ? cells[j].trim() : "");
                else fullRow.push("");
            }
            const materials = [];
            for (let col = 1; col < fullRow.length; col++) {
                const rawVal = fullRow[col];
                if (rawVal === "") continue;
                const qty = parseInt(rawVal, 10);
                if (isNaN(qty) || qty === 0) continue;
                const matName = headers[col];
                if (matName) materials.push({ name: matName, quantity: qty });
            }
            if (materials.length === 0) continue;
            if (!recipesMap.has(itemName)) recipesMap.set(itemName, []);
            recipesMap.get(itemName).push({ materials });
        }
        return { recipesMap, orderList, materialNames };
    }

    const { recipesMap, orderList, materialNames } = parseCraftingData(csvRaw);
    function isBaseMaterial(name) { return !recipesMap.has(name); }

    // 获取单个配方的直接材料Map（不合并多个配方）
    function getRecipeMaterials(recipe) {
        const map = new Map();
        for (const mat of recipe.materials) {
            map.set(mat.name, (map.get(mat.name) || 0) + mat.quantity);
        }
        return map;
    }

    // 递归获取完全分解基础材料合计（按单个配方展开）
    function getFullBaseForRecipe(recipe, quantity = 1) {
        const result = new Map();
        for (const mat of recipe.materials) {
            const subResult = decomposeMaterial(mat.name, mat.quantity * quantity);
            for (const [k,v] of subResult) result.set(k, (result.get(k)||0)+v);
        }
        return result;
    }
    function decomposeMaterial(matName, qty, visited = new Set()) {
        if (visited.has(matName)) return new Map();
        visited.add(matName);
        if (isBaseMaterial(matName)) {
            visited.delete(matName);
            return new Map([[matName, qty]]);
        }
        const recipes = recipesMap.get(matName);
        if (!recipes || recipes.length === 0) return new Map([[matName, qty]]);
        const recipe = recipes[0];
        const result = new Map();
        for (const sub of recipe.materials) {
            const subRes = decomposeMaterial(sub.name, sub.quantity * qty, new Set(visited));
            for (const [k,v] of subRes) result.set(k, (result.get(k)||0)+v);
        }
        visited.delete(matName);
        return result;
    }

    // 分层获取材料（按单个配方，每层独立）
    function getLayersForRecipe(recipe, itemName) {
        const layers = [];
        let currentLayer = new Map();
        for (const mat of recipe.materials) {
            currentLayer.set(mat.name, (currentLayer.get(mat.name)||0) + mat.quantity);
        }
        layers.push(currentLayer);
        while (true) {
            let nextLayer = new Map();
            let hasAny = false;
            for (let [matName, qty] of currentLayer) {
                if (recipesMap.has(matName)) {
                    hasAny = true;
                    const subRecipes = recipesMap.get(matName);
                    if (subRecipes && subRecipes.length) {
                        const subRecipe = subRecipes[0];
                        for (const sub of subRecipe.materials) {
                            nextLayer.set(sub.name, (nextLayer.get(sub.name)||0) + sub.quantity * qty);
                        }
                    } else {
                        nextLayer.set(matName, (nextLayer.get(matName)||0) + qty);
                    }
                } else {
                    nextLayer.set(matName, (nextLayer.get(matName)||0) + qty);
                }
            }
            if (!hasAny) break;
            layers.push(nextLayer);
            currentLayer = nextLayer;
        }
        return layers;
    }

    function getItemColorClass(itemName) {
        if (itemName.startsWith('随机永恒')) return 'bg-random-eternal';
        const mythList = ['暗夜对剑', '冲锋盾', '尖刺铠甲', '镇魂宝石', '神行靴', '白银之刃', '圣洁坠饰', '奥术披风']
        if (itemName.startsWith('随机神话') || mythList.includes(itemName)) return 'bg-random-myth';
        const equipmentList = ['阔剑', '小圆盾', '龙纹印', '纪念石碑', '红宝石杯', '治愈之心', '潮汐之刃', '秘法钥匙'];
        if (equipmentList.includes(itemName)) return 'bg-equipment';
        const subMaterialList = ['傀儡娃娃', '野兽图腾', '集合旗', '部落酒杯', '骨质节杖', '秘银斧']
        if (subMaterialList.includes(itemName)) return 'bg-submaterial';
        const normalList = ['青铜匕首', '骨锯', '石锤'];
        if (normalList.includes(itemName)) return 'bg-normal';
        // 基础材料：野兽骨、青铜镜、石灰岩等
        return 'bg-base';
    }

    function showTips(name) {
        const nameTips = document.getElementById('nameTips');
        if (name === '随机神话I') {
            nameTips.innerText = '【暗夜对剑、冲锋盾、尖刺铠甲、镇魂宝石】';
        }
        else if (name === '随机神话II') {
            nameTips.innerText = '【神行靴、白银之刃、圣洁坠饰、奥术披风】';
        }
        else if (name === '随机永恒I') {
            nameTips.innerText = '【魔龙之心、冰晶圣盾、永恒战甲、致命弩炮】';
        }
        else if (name === '随机永恒II') {
            nameTips.innerText = '【神圣之耀、虚无法杖、水晶之塔、混沌沙漏】';
        } else {
            nameTips.innerText = '';
        }
    }

    // 渲染默认视图（直接配方 + 完全分解基础合计）- 支持多配方Tab
    function renderRecipes(itemName) {
        const displayDiv = document.getElementById('recipeDisplay');
        const resultSpan = document.getElementById('resultItemName');
        if (!itemName) {
            resultSpan.innerText = '未选取';
            displayDiv.innerHTML = `<div class="empty-message">🔍 请选择一件物品</div>`;
            return;
        }
        currentItem = itemName;
        currentTabRecipeIndex = 0;
        const recipes = recipesMap.get(itemName);
        if (!recipes || recipes.length === 0) {
            resultSpan.innerText = itemName;
            displayDiv.innerHTML = `<div class="empty-message">“${escapeHtml(itemName)}” 是基础材料，无合成配方。</div>`;
            return;
        }
        resultSpan.innerText = itemName;
        showTips(itemName);
        let tabsHtml = `<div class="tabs-container">`;
        if (recipes.length > 1) {
            tabsHtml += `<div class="tab-headers">`;
            recipes.forEach((_, idx) => {
                const activeClass = (idx === 0) ? 'active' : '';
                tabsHtml += `<button class="tab-btn ${activeClass}" data-tab="tab-${idx}">配方 ${idx+1}</button>`;
            });
            tabsHtml += `</div>`;
        }
        recipes.forEach((recipe, idx) => {
            // 直接材料
            const materialsMap = getRecipeMaterials(recipe);
            const sortedMats = sortByOriginalOrder(Array.from(materialsMap.entries()));
            // 完全分解基础材料
            const fullBaseMap = getFullBaseForRecipe(recipe);
            const sortedBase = sortByOriginalOrder(Array.from(fullBaseMap.entries()));
            const activeClass = (idx === 0) ? 'active' : '';
            tabsHtml += `<div class="tab-content ${activeClass}" id="tab-${idx}">`;
            tabsHtml += `<div class="table-wrapper"><table class="material-table"><thead><tr><th>⚒️ 直接次级材料</th><th>🔢 数量</th></tr></thead><tbody>`;
            for (const [name, qty] of sortedMats) {
                tabsHtml += `<tr><td><span class="item-name ${getItemColorClass(name)}">${escapeHtml(name)}</span></td><td><span class="qty-num">${qty}</span> 个</td></tr>`;
            }
            tabsHtml += `</tbody></table></div>`;
            tabsHtml += `<div class="full-decomp-section"><div class="decomp-header">🧬 完全分解 · 基础材料合计</div>`;
            if (sortedBase.length === 0) {
                tabsHtml += `<div class="base-note">该配方无需进一步分解</div>`;
            } else {
                tabsHtml += `<div class="table-wrapper"><table class="material-table"><thead><tr><th>🌿 基础材料</th><th>🔢 总需求</th></tr></thead><tbody>`;
                for (const [name, qty] of sortedBase) {
                    tabsHtml += `<tr><td><span class="item-name ${getItemColorClass(name)}">${escapeHtml(name)}</span></td><td><span class="qty-num">${qty}</span> 个</td></tr>`;
                }
                tabsHtml += `</tbody></table></div>`;
            }
            tabsHtml += `</div></div>`;
        });
        tabsHtml += `</div>`;
        displayDiv.innerHTML = tabsHtml;
        bindTabEvents();
    }

    // 渲染分层视图（每层材料汇总）- 支持多配方Tab
    function renderLayers(itemName) {
        const displayDiv = document.getElementById('recipeDisplay');
        const resultSpan = document.getElementById('resultItemName');
        if (!itemName) {
            resultSpan.innerText = '未选取';
            displayDiv.innerHTML = `<div class="empty-message">请选择物品后点击按钮</div>`;
            return;
        }

        currentItem = itemName;
        currentTabRecipeIndex = 0;
        const recipes = recipesMap.get(itemName);
        if (!recipes || recipes.length === 0) {
            resultSpan.innerText = itemName;
            displayDiv.innerHTML = `<div class="empty-message">“${escapeHtml(itemName)}” 是基础材料，无法分解。</div>`;
            return;
        }
        resultSpan.innerText = `${itemName} · 分层材料汇总`;
        let tabsHtml = `<div class="tabs-container">`;
        if (recipes.length > 1) {
            tabsHtml += `<div class="tab-headers">`;
            recipes.forEach((_, idx) => {
                const activeClass = (idx === 0) ? 'active' : '';
                tabsHtml += `<button class="tab-btn ${activeClass}" data-tab="layerTab-${idx}">配方 ${idx+1}</button>`;
            });
            tabsHtml += `</div>`;
        }
        recipes.forEach((recipe, idx) => {
            const layers = getLayersForRecipe(recipe, itemName);
            const activeClass = (idx === 0) ? 'active' : '';
            tabsHtml += `<div class="tab-content ${activeClass}" id="layerTab-${idx}">`;
            layers.forEach((layer, lvl) => {
                if (layer.size === 0) return;
                const sorted = sortByOriginalOrder(Array.from(layer.entries()));
                tabsHtml += `<div class="layer-card"><div class="layer-title">📁 第 ${lvl+1} 层材料</div>`;
                tabsHtml += `<div class="table-wrapper"><table class="material-table"><thead><tr><th>材料名称</th><th>所需数量</th></tr></thead><tbody>`;
                for (const [name, qty] of sorted) {
                    tabsHtml += `<tr><td><span class="item-name ${getItemColorClass(name)}">${escapeHtml(name)}</span></td><td><span class="qty-num">${qty}</span> 个</td></tr>`;
                }
                tabsHtml += `</tbody></table></div></div>`;
            });
            tabsHtml += `</div>`;
        });
        tabsHtml += `</div>`;
        displayDiv.innerHTML = tabsHtml;
        bindTabEvents();
    }

    function bindTabEvents() {
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.removeEventListener('click', handleTabClick);
            btn.addEventListener('click', handleTabClick);
        });
    }
    function handleTabClick(e) {
        const targetTab = e.currentTarget.getAttribute('data-tab');
        const container = e.currentTarget.closest('.tabs-container');
        container.querySelectorAll('.tab-content').forEach(tc => tc.classList.remove('active'));
        container.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
        e.currentTarget.classList.add('active');
        const targetContent = container.querySelector(`#${targetTab}`);
        if (targetContent) targetContent.classList.add('active');
        // 更新当前配方索引
        const tabId = targetTab;
        if (tabId.startsWith('tab-')) {
            currentTabRecipeIndex = parseInt(tabId.split('-')[1]);
        } else if (tabId.startsWith('layerTab-')) {
            currentTabRecipeIndex = parseInt(tabId.split('-')[1]);
        }
    }

    // 获取当前配方的基础材料合计（根据当前物品和索引）
    function getCurrentRecipeBaseMaterials() {
        if (!currentItem) return null;
        const recipes = recipesMap.get(currentItem);
        if (!recipes || recipes.length === 0) return null;
        const idx = Math.min(currentTabRecipeIndex, recipes.length - 1);
        const recipe = recipes[idx];
        return getFullBaseForRecipe(recipe);
    }

    function sortByOriginalOrder(entries) {
        const indexMap = new Map();
        materialNames.forEach((name, idx) => indexMap.set(name, idx));
        return entries.sort((a, b) => {
            const idxA = indexMap.get(a[0]) ?? 9999;
            const idxB = indexMap.get(b[0]) ?? 9999;
            return idxA - idxB;
        });
    }

    function showMaterialDialog() {
        if (!currentItem) {
            alert('请先选择一件物品');
            return;
        }
        const allMaterials = getCurrentRecipeAllMaterials();
        if (!allMaterials || allMaterials.size === 0) {
            alert('当前物品无任何材料需求');
            return;
        }
        const dialog = document.getElementById('materialDialog');
        const body = document.getElementById('dialogBody');
        // 按名称排序
        const sorted = sortByOriginalOrder(Array.from(allMaterials.entries()));
        let html = '';
        for (const [name, required] of sorted) {
            html += `
                <div class="material-input-row">
                    <label><span class="item-name ${getItemColorClass(name)}">${escapeHtml(name)}</span> (需要 ${required})</label>
                    <input type="number" min="0" value="0" data-name="${escapeHtml(name)}" data-required="${required}" class="material-own-input">
                </div>
            `;
        }
        body.innerHTML = html;
        dialog.style.display = 'flex';
        document.getElementById('calcResult').style.display = 'none';
    }

    // 计算并显示结果
    function calculateRemaining() {
        const inputs = document.querySelectorAll('.material-own-input');
        let resultHtml = '<h4>📋 还需材料数量：</h4><ul>';
        let hasRemaining = false;
        for (const input of inputs) {
            const name = input.getAttribute('data-name');
            const required = parseInt(input.getAttribute('data-required'));
            const own = parseInt(input.value) || 0;
            const remain = required - own;
            if (remain > 0) {
                hasRemaining = true;
                resultHtml += `<li>${escapeHtml(name)}：<strong>${remain}</strong> 个 (需要 ${required}，已有 ${own})</li>`;
            } else if (remain < 0) {
                resultHtml += `<li>${escapeHtml(name)}：<span style="color:#6c7a6b;">富余 ${-remain} 个</span></li>`;
            } else {
                resultHtml += `<li>${escapeHtml(name)}：<span style="color:#6c7a6b;">刚好足够</span></li>`;
            }
        }
        if (!hasRemaining) {
            resultHtml += '<li>🎉 所有材料已充足或富余！</li>';
        }
        resultHtml += '</ul>';
        const resultDiv = document.getElementById('calcResult');
        resultDiv.innerHTML = resultHtml;
        resultDiv.style.display = 'block';
    }

    // 关闭弹窗
    function closeDialog() {
        document.getElementById('materialDialog').style.display = 'none';
    }

    // 递归获取某个配方下所有材料的总需求（包括所有层级，去重累加）
    function getAllMaterialsForRecipe(recipe, quantity = 1, visited = new Set()) {
        const result = new Map();
        // 为防止循环依赖，记录当前路径上的材料
        const localVisited = new Set(visited);
        
        for (const mat of recipe.materials) {
            const subQty = mat.quantity * quantity;
            // 先累加当前材料自身
            result.set(mat.name, (result.get(mat.name) || 0) + subQty);
            
            // 如果该材料有配方且未在当前路径中（避免循环），递归展开其配方
            if (recipesMap.has(mat.name) && !localVisited.has(mat.name)) {
                localVisited.add(mat.name);
                const subRecipes = recipesMap.get(mat.name);
                if (subRecipes && subRecipes.length > 0) {
                    // 注意：中间材料可能有多个配方，这里取第一个（与原逻辑一致）
                    const subRecipe = subRecipes[0];
                    const subResult = getAllMaterialsForRecipe(subRecipe, subQty, localVisited);
                    for (const [subName, subTotal] of subResult) {
                        result.set(subName, (result.get(subName) || 0) + subTotal);
                    }
                }
                localVisited.delete(mat.name);
            }
        }
        return result;
    }

    // 获取当前物品当前配方下的所有材料总需求（便捷函数）
    function getCurrentRecipeAllMaterials() {
        if (!currentItem) return null;
        const recipes = recipesMap.get(currentItem);
        if (!recipes || recipes.length === 0) return null;
        const idx = Math.min(currentTabRecipeIndex, recipes.length - 1);
        const recipe = recipes[idx];
        return getAllMaterialsForRecipe(recipe, 1);
    }

    function escapeHtml(str) {
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }

    // 自定义下拉框逻辑
    let currentSelectedValue = "";
    let isLayerView = false;  // 当前是否显示分层视图
    const toggleBtn = document.getElementById('toggleViewBtn');

    function populateCustomSelect() {
        const optionsList = document.getElementById('optionsList');
        optionsList.innerHTML = '';
        orderList.forEach(name => {
            const div = document.createElement('div');
            div.className = 'option-item';
            div.classList.add('option-item', getItemColorClass(name));
            div.textContent = name;
            div.setAttribute('data-value', name);
            div.addEventListener('click', (e) => {
                e.stopPropagation();
                selectCustomOption(name);
                closeDropdown();
                // 选择物品后自动显示默认配方视图
                renderRecipes(name);
                isLayerView = false;
                toggleBtn.innerHTML = '✨揭示全层材料';
                toggleBtn.classList.remove('back-btn');
                toggleBtn.classList.add('search-btn');
            });
            optionsList.appendChild(div);
        });
    }
    function selectCustomOption(value) {
        currentSelectedValue = value;
        document.getElementById('selectedItemText').textContent = value;
        document.querySelectorAll('.option-item').forEach(opt => {
            if (opt.getAttribute('data-value') === value) opt.classList.add('selected');
            else opt.classList.remove('selected');
        });
        const selectedText = document.getElementById('customSelectTrigger');
        selectedText.className = `custom-select-trigger ${getItemColorClass(currentSelectedValue)}`;
    }
    function closeDropdown() {
        document.getElementById('customSelectOptions').style.display = 'none';
        document.getElementById('customSelectTrigger').classList.remove('open');
    }
    function openDropdown() {
        document.getElementById('customSelectOptions').style.display = 'block';
        document.getElementById('customSelectTrigger').classList.add('open');
        const selected = document.querySelector('.option-item.selected');
        if (selected) selected.scrollIntoView({ block: 'nearest', behavior: 'auto' });
    }
    function initCustomSelect() {
        const trigger = document.getElementById('customSelectTrigger');
        const wrapper = document.getElementById('customSelectWrapper');
        trigger.addEventListener('click', (e) => {
            e.stopPropagation();
            const isOpen = document.getElementById('customSelectOptions').style.display === 'block';
            isOpen ? closeDropdown() : openDropdown();
        });
        document.addEventListener('click', function(e) {
            if (!wrapper.contains(e.target)) closeDropdown();
        });
    }

    function init() {
        populateCustomSelect();
        initCustomSelect();

        function switchToRecipeView() {
            if (currentSelectedValue) {
                renderRecipes(currentSelectedValue);
                isLayerView = false;
                toggleBtn.innerHTML = '✨揭示全层材料';
                toggleBtn.classList.remove('back-btn');
                toggleBtn.classList.add('search-btn');
            }
        }

        function switchToLayerView() {
            if (currentSelectedValue) {
                renderLayers(currentSelectedValue);
                isLayerView = true;
                toggleBtn.innerHTML = '↺返回配方视图';
                toggleBtn.classList.remove('search-btn');
                toggleBtn.classList.add('back-btn');
            }
        }

        toggleBtn.addEventListener('click', () => {
            if (!currentSelectedValue) {
                document.getElementById('resultItemName').innerText = '未选取';
                document.getElementById('recipeDisplay').innerHTML = `<div class="empty-message">请先选择物品再点击按钮</div>`;
                return;
            }
            if (isLayerView) {
                switchToRecipeView();
            } else {
                switchToLayerView();
            }
        });

        renderRecipes(null);

        const calcBtn = document.getElementById('calcMaterialBtn');
        calcBtn.addEventListener('click', showMaterialDialog);

        // 关闭弹窗事件
        document.querySelector('.dialog-close').addEventListener('click', closeDialog);
        document.getElementById('calcCancelBtn').addEventListener('click', closeDialog);
        document.getElementById('calcSubmitBtn').addEventListener('click', calculateRemaining);
        // 点击遮罩关闭
        document.getElementById('materialDialog').addEventListener('click', (e) => {
            if (e.target === document.getElementById('materialDialog')) closeDialog();
        });
    }
    window.addEventListener('DOMContentLoaded', init);
</script>
